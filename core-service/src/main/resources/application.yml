server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/feexray_core}
    username: ${SPRING_DATASOURCE_USERNAME:feexray}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:8080/realms/fee-xray}

stripe:
  api-key: ${STRIPE_API_KEY:sk_test_mock_123}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_mock_123}
  pro-price-id: ${STRIPE_PRO_PRICE_ID:price_mock_pro}
